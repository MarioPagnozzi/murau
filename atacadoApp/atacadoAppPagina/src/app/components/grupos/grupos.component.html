<div class="murau__container">
    <ngx-spinner bdColor="rgba(75,46,40,0.7)"
                color="#ffff"
                size="medium"
                type="ball-spin-fade-rotating"
                [fullScreen]="true">
        <p style="font-size: 20px; color: white">{{spinnerAcao}}</p>
    </ngx-spinner>
    <h1>Listagem de Grupos</h1>
    <h5>Consulta - Exclusão e Manutenção de Grupos</h5>
    <p-toolbar styleClass="p-mb-4">
        <ng-template pTemplate="left">
            <button pButton 
                    pRipple 
                    label="Novo Grupo" 
                    icon="pi pi-plus"
                    class="p-button-primary p-mr-2"
                    routerLink="/usuario/novo"
                    *ngIf="inserir"></button>

            <button pButton
                    pRipple
                    icon="pi pi-trash"
                    class="p-button-danger p-mr-2"
                    (click)="excluirGrupos()"
                    [disabled]="!selGrupos || !selGrupos.length"></button>

            <button pButton
                    pRipple
                    [pTooltip]="toolTipBtnExcluidos"
                    [icon]="iconBtnEye"
                    class="p-button-help"
                    (click)="mostraGrupoExcluidos()"></button>

        </ng-template>
        
    </p-toolbar>
    <p-table #dt [value]="grupoList"
                 [rows]="10"
                 [paginator]="true"
                 [globalFilterFields]="['nome_grupo']"
                 [(selection)]="selGrupos"
                 [rowHover]="true"
                 dataKey="uid"
                 currentPageReportTemplate="Mostrando {first} até {last} de {totalRecords} grupos"
                 [showCurrentPageReport]="true" styleClass="p-datatable-responsive" [responsive]="true">
        <ng-template pTemplate="caption">
            <div class="p-d-flex p-ai-center p-jc-between">
                <h2 class="p-m-0">Grupos</h2>
                <span class="p-input-icon-left">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" (input)="applyFilterGlobal($event, 'contains')" placeholder="Buscar..." />
                </span>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 3rem">
                    <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                </th>
                <th pSortableColumn="nome_grupo" colspan="45%">Grupo<p-sortIcon field= "nome_grupo"></p-sortIcon></th>
              
                <th pSortableColumn="data_inclusao" colspan="20%">Data Inc.<p-sortIcon field="data_inclusao"></p-sortIcon></th>
                <th pSortableColumn="data_alteracao" colspan="20%">Última Alt.<p-sortIcon field="data_alteracao"></p-sortIcon></th>
                
                <th colspan="10%"></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-grupo>
            <tr>
                <td *ngIf="!grupo.ativo || !grupo.excluido">
                    <p-tableCheckbox [value]="grupo" [disabled]="grupo.excluido || !grupo.ativo"></p-tableCheckbox>
                </td>
                <td [ngClass]="{'registroExcluido': grupo.excluido}" colspan="45%">{{grupo.nome_grupo}}</td>
               
                <td [ngClass]="{'registroExcluido': grupo.excluido}" colspan="20%">{{grupo.data_inclusao | date: 'dd/MM/yyyy'}}</td>
                <td [ngClass]="{'registroExcluido': grupo.excluido}" colspan="20%">{{grupo.data_alteracao | date: 'dd/MM/yyyy'}}</td>
                <td *ngIf="!grupo.excluido && grupo.ativo" colspan="10%">
                    <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-primary p-mr-2" routerLink="/grupo/{{grupo.uid}}"></button>
                    <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger" (click)="excluirGrupo(grupo)" *ngIf="excluir"></button>
                </td>
                <td *ngIf="grupo.excluido || !grupo.ativo" colspan="12%">
                    <button pButton pRipple pTooltip="Retaurar Registro" icon="pi pi-undo" class="p-button-rounded p-button-help p-mr-2" (click)="restauraGrupo(grupo)" *ngIf="alterar"></button>                                
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="summary">
            
        </ng-template>
    </p-table>
    <p-confirmDialog [style]="{width: '500px'}"></p-confirmDialog>
</div>
