<div class="murau__container">
    <ngx-spinner bdColor="rgba(75,46,40,0.7)"
                color="#ffff"
                size="medium"
                type="ball-spin-fade-rotating"
                [fullScreen]="true">
        <p style="font-size: 20px; color: white">{{spinnerAcao}}</p>
    </ngx-spinner>
    <h1>Listagem de Produtos</h1>
    <h5>Consulta - Exclusão e Manutenção de Produtos</h5>
    <p-toolbar styleClass="p-mb-4">
        <ng-template pTemplate="left">
            <button pButton 
                    pRipple 
                    label="Novo Produto" 
                    icon="pi pi-plus"
                    class="p-button-primary p-mr-2"
                    routerLink="/produto/novo"
                    *ngIf="inserir"></button>

            <button pButton
                    pRipple
                    icon="pi pi-trash"
                    class="p-button-danger p-mr-2"
                    (click)="excluirProdutos()"
                    [disabled]="!selProdutos || !selProdutos.length"></button>

            <p-button 
                    pRipple
                    [pTooltip]="toolTipBtnExcluidos"
                    [icon]="iconBtnEye"
                    styleClass="p-button-help"
                    (click)="mostraProdutosExcluidos()"></p-button>

        </ng-template>
        
    </p-toolbar>
    <p-table #dt [value]="produtoList"
                 [rows]="10"s
                 [paginator]="true"
                 [globalFilterFields]="['nome', 'referencia', 'codigo']"
                 [(selection)]="selProdutos"
                 [rowHover]="true"
                 dataKey="uid"
                 currentPageReportTemplate="Mostrando {first} até {last} de {totalRecords} Produtos"
                 [showCurrentPageReport]="true" styleClass="p-datatable-responsive" [responsive]="true">
        <ng-template pTemplate="caption">
            <div class="p-d-flex p-ai-center p-jc-between">
                <h2 class="p-m-0">Produtos</h2>
                <span class="p-input-icon-left">
                    <i class="pi pi-search"></i>
                    <input pInputText type="text" (input)="applyFilterGlobal($event, 'contains')" placeholder="Buscar..." />
                </span>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 3rem">
                    <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                </th>
                <th pSortableColumn="codigo" colspan="10%">Cód.<p-sortIcon field= "codigo"></p-sortIcon></th>
                <th pSortableColumn="referencia" colspan="10%">Ref.<p-sortIcon field= "referencia"></p-sortIcon></th>
                <th pSortableColumn="nome" colspan="25%">Produto<p-sortIcon field= "nome"></p-sortIcon></th>
              
                <th pSortableColumn="data_inclusao" colspan="20%">Data Inc.<p-sortIcon field="data_inclusao"></p-sortIcon></th>
                <th pSortableColumn="data_alteracao" colspan="20%">Última Alt.<p-sortIcon field="data_alteracao"></p-sortIcon></th>
                
                <th colspan="10%"></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-produto>
            <tr>
                <td *ngIf="!produto.ativo || !produto.excluido">
                    <p-tableCheckbox [value]="produto" [disabled]="produto.excluido || !produto.ativo"></p-tableCheckbox>
                </td>
                <td [ngClass]="{'registroExcluido': produto.excluido}" colspan="10%">{{produto.codigo}}</td>
                <td [ngClass]="{'registroExcluido': produto.excluido}" colspan="10%">{{produto.referencia}}</td>
                <td [ngClass]="{'registroExcluido': produto.excluido}" colspan="25%">{{produto.nome}}</td>
               
                <td [ngClass]="{'registroExcluido': produto.excluido}" colspan="20%">{{produto.data_inclusao | date: 'dd/MM/yyyy'}}</td>
                <td [ngClass]="{'registroExcluido': produto.excluido}" colspan="20%">{{produto.data_alteracao | date: 'dd/MM/yyyy'}}</td>
                <td *ngIf="!produto.excluido && produto.ativo" colspan="10%">
                    <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-primary p-mr-2" routerLink="/produto/{{produto.uid}}"></button>
                    <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger" (click)="excluirProduto(produto)" *ngIf="excluir"></button>
                </td>
                <td *ngIf="produto.excluido || !produto.ativo" colspan="12%">
                    <button pButton pRipple pTooltip="Retaurar Registro" icon="pi pi-undo" class="p-button-rounded p-button-help p-mr-2" (click)="restauraProduto(produto)" *ngIf="alterar"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="summary">
            
        </ng-template>
    </p-table>
    <p-confirmDialog [style]="{width: '500px'}"></p-confirmDialog>
</div>
